name: Master_Mind

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu_latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

        -name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        -name: Install dependencies
        run: | 
          python: -m pip install --upgrade pip
          pip install flake

        -name: Run flake8
        run: flake8 masterMind.py